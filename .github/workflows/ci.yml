name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Policy check (no plaintext credential files)
        run: |
          if git ls-files | rg -n "^\\.env$|google_credentials\\.json$"; then
            echo "Plaintext credential file tracked in repository."
            exit 1
          fi
          if rg -n "BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY" --glob "!portal/SECURITY_RUNBOOK.md" .; then
            echo "Private key material detected in tracked files."
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Syntax smoke check
        env:
          PYTHONPATH: backend:frontend
        run: python -m py_compile backend/orb_bot_fabio.py backend/backtest/fabio/*.py backend/fabio_live/*.py

      - name: Run test suite
        env:
          PYTHONPATH: backend:frontend
        run: python -m pytest -c backend/pytest.ini backend/tests/ -q
