name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Policy check (no plaintext credential files)
        run: |
          if git ls-files | rg -n "^\\.env$|google_credentials\\.json$"; then
            echo "Plaintext credential file tracked in repository."
            exit 1
          fi
          if rg -n "BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY" --glob "!SECURITY_RUNBOOK.md" .; then
            echo "Private key material detected in tracked files."
            exit 1
          fi

      - name: Syntax smoke check
        run: python -m py_compile orb_bot_fabio.py fabio/*.py fabio_live/*.py

      - name: Run test suite
        run: python -m pytest tests/ -q
