name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan tracked files against baseline
        run: git ls-files -z | xargs -0 detect-secrets-hook --baseline .secrets.baseline
